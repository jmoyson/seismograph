services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-seismo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-seismograph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seismo} -d ${DB_NAME:-seismograph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-seismo}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-seismograph}
      DATABASE_URL: postgresql://${DB_USER:-seismo}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-seismograph}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USGS_FEED_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_hour.geojson
      USGS_SEED_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_month.geojson
      PORT: 3000

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  # Custom Apache Superset image with the @seismograph/superset-plugins
  # package compiled into the frontend. The webpack build needs ~8 GB of
  # heap, which is more than our shared Dokploy host can spare without
  # OOM-killing prod containers. So the image is built by GitHub Actions
  # (.github/workflows/build-superset-image.yml) and pushed to GHCR.
  #
  # NO `build:` block here on purpose. Dokploy interprets the presence of
  # `build:` as "build this from source" and ignores `image:` for pull
  # decisions, which silently bypassed GHA on the first deploy. The only
  # supported flow on Dokploy is `docker compose pull && docker compose
  # up -d`. For the rare case of needing to rebuild locally, use:
  #
  #     docker build -f docker/superset/Dockerfile \
  #       -t ghcr.io/jmoyson/seismograph-superset:latest .
  #
  # See docker/superset/README.md for the full runbook.
  superset:
    image: ${SUPERSET_IMAGE:-ghcr.io/jmoyson/seismograph-superset:latest}
    # Always re-pull on `docker compose up` so Dokploy picks up new GHCR
    # builds without needing an explicit `docker compose pull`. The default
    # `missing` policy reuses any locally-cached :latest tag, which silently
    # keeps the old image even after a successful new push.
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY required}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD required}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@seismograph.local}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER:-seismo}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_DB: ${DB_NAME:-seismograph}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8088/health').read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  pgdata:
  redisdata:
  superset_home:
