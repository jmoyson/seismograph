version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-seismo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-seismograph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seismo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-seismo}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-seismograph}
      DATABASE_URL: postgresql://${DB_USER:-seismo}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-seismograph}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USGS_FEED_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_hour.geojson
      USGS_SEED_URL: https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_week.geojson
      PORT: 3000

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata:
